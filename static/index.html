<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cálculo de Cashback</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="container">
    <h1>Cálculo de Cashback</h1>

    <form id="form">
      <label>Tipo de Cliente</label>
      <select id="tipo" required>
        <option value="NORMAL">Normal</option>
        <option value="VIP">VIP ⭐</option>
      </select>

      <label>Valor da Compra (R$)</label>
      <input type="number" id="valor" placeholder="600.00" step="0.01" min="0.01" required>

      <label>Desconto (%)</label>
      <input type="number" id="desconto" placeholder="0" min="0" max="100" value="0">

      <button type="submit">Calcular</button>
    </form>

    <div id="resultado" class="hidden">
      <h2>Resultado</h2>
      <p>Valor final: <strong id="r-final">-</strong></p>
      <p>Cashback: <strong id="r-cashback">-</strong></p>
      <p id="r-tags"></p>
    </div>

    <h2>Histórico</h2>
    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Compra</th>
          <th>Desconto</th>
          <th>Final</th>
          <th>Cashback</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="historico"></tbody>
    </table>
    <p id="vazio">Nenhuma consulta ainda.</p>
  </div>
  <script src="/static/app.js"></script>
</body>

</html>
